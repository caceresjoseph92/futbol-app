{{define "content"}}
<div class="max-w-lg mx-auto">
  <div class="flex items-center justify-between mb-6">
    <h1 class="text-2xl font-bold text-gray-800">
      {{if eq .Action "create"}}Nuevo jugador{{else}}Editar jugador{{end}}
    </h1>
    <a href="/admin/players" class="text-sm text-gray-400 hover:underline">← Volver</a>
  </div>

  {{if .Error}}
    <div class="bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-xl mb-4 text-sm">
      {{.Error}}
    </div>
  {{end}}

  <form
    action="{{if eq .Action "create"}}/admin/players{{else}}/admin/players/{{.Player.ID}}{{end}}"
    method="POST"
    class="bg-white rounded-2xl shadow-sm border p-6 space-y-5"
  >
    {{if eq .Action "edit"}}
      <input type="hidden" name="_method" value="PUT" />
    {{end}}

    <!-- Nombre -->
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Nombre *</label>
      <input type="text" name="name" required
        value="{{if .Player}}{{.Player.Name}}{{end}}"
        class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-green-500 focus:outline-none"
        placeholder="Ej: Yuber"
      />
    </div>

    <!-- Posición principal -->
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Posición principal *</label>
      <select name="primary_position" required
        class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-green-500 focus:outline-none"
      >
        <option value="">Selecciona...</option>
        <option value="delantero" {{if and .Player (eq .Player.PrimaryPosition "delantero")}}selected{{end}}>Delantero</option>
        <option value="defensa"   {{if and .Player (eq .Player.PrimaryPosition "defensa")}}selected{{end}}>Defensa</option>
        <option value="creador"   {{if and .Player (eq .Player.PrimaryPosition "creador")}}selected{{end}}>Creador / Medio</option>
      </select>
    </div>

    <!-- Posiciones secundarias -->
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-2">También puede jugar de</label>
      <div class="flex gap-4">
        <label class="flex items-center gap-2 text-sm text-gray-600">
          <input type="checkbox" name="can_play_positions" value="delantero" class="accent-green-600"
            {{if and .Player (index .CanPlay "delantero")}}checked{{end}} />
          <span>Delantero</span>
        </label>
        <label class="flex items-center gap-2 text-sm text-gray-600">
          <input type="checkbox" name="can_play_positions" value="defensa" class="accent-green-600"
            {{if and .Player (index .CanPlay "defensa")}}checked{{end}} />
          <span>Defensa</span>
        </label>
        <label class="flex items-center gap-2 text-sm text-gray-600">
          <input type="checkbox" name="can_play_positions" value="creador" class="accent-green-600"
            {{if and .Player (index .CanPlay "creador")}}checked{{end}} />
          <span>Creador / Medio</span>
        </label>
      </div>
    </div>

    <!-- Notas -->
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Notas</label>
      <input type="text" name="notes"
        value="{{if .Player}}{{.Player.Notes}}{{end}}"
        class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-green-500 focus:outline-none"
        placeholder="Ej: puede subir, versátil"
      />
    </div>

    <!-- Rating -->
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">
        Rating (1–10) *
        <span class="text-xs text-gray-400 ml-1">— solo visible para admins</span>
      </label>
      <input type="number" name="rating" min="1" max="10" required
        value="{{if .Player}}{{.Player.Rating}}{{else}}7{{end}}"
        class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-green-500 focus:outline-none"
      />
    </div>

    <button type="submit"
      class="w-full bg-green-600 hover:bg-green-700 text-white font-semibold py-2 rounded-lg transition text-sm">
      {{if eq .Action "create"}}Crear jugador{{else}}Guardar cambios{{end}}
    </button>
  </form>
</div>
{{end}}
