{{define "content"}}
<div class="max-w-lg mx-auto">
  <div class="flex items-center justify-between mb-6">
    <h1 class="text-2xl font-bold text-gray-800">Nuevo usuario</h1>
    <a href="/admin/users" class="text-sm text-gray-400 hover:underline">← Volver</a>
  </div>

  {{if .Error}}
    <div class="bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-xl mb-4 text-sm">
      {{.Error}}
    </div>
  {{end}}

  <form action="/admin/users" method="POST"
        class="bg-white rounded-2xl shadow-sm border p-6 space-y-5">
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Nombre *</label>
      <input type="text" name="name" required
        class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-green-500 focus:outline-none" />
    </div>
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Email *</label>
      <input type="email" name="email" required
        class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-green-500 focus:outline-none" />
    </div>
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Contraseña *</label>
      <input type="password" name="password" required
        class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-green-500 focus:outline-none" />
    </div>
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Rol *</label>
      <select name="role" required
        class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-green-500 focus:outline-none">
        <option value="viewer">Viewer — solo consulta</option>
        <option value="admin">Admin — acceso total</option>
      </select>
    </div>
    <button type="submit"
      class="w-full bg-green-600 hover:bg-green-700 text-white font-semibold py-2 rounded-lg text-sm transition">
      Crear usuario
    </button>
  </form>
</div>
{{end}}
