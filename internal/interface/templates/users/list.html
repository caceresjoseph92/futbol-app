{{define "content"}}
<div class="space-y-6">
  <div class="flex items-center justify-between">
    <h1 class="text-2xl font-bold text-gray-800">Usuarios</h1>
    <a href="/admin/users/new"
       class="bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded-lg text-sm font-semibold">
      + Nuevo usuario
    </a>
  </div>

  <div class="bg-white rounded-2xl shadow-sm border overflow-hidden">
    <table class="w-full text-sm">
      <thead class="bg-gray-50 border-b">
        <tr>
          <th class="text-left px-4 py-3 text-gray-600 font-semibold">Nombre</th>
          <th class="text-left px-4 py-3 text-gray-600 font-semibold">Email</th>
          <th class="text-left px-4 py-3 text-gray-600 font-semibold">Rol</th>
          <th class="text-right px-4 py-3 text-gray-600 font-semibold">Acciones</th>
        </tr>
      </thead>
      <tbody class="divide-y divide-gray-100">
        {{range .Users}}
          <tr class="hover:bg-gray-50">
            <td class="px-4 py-3 font-medium text-gray-800">{{.Name}}</td>
            <td class="px-4 py-3 text-gray-500">{{.Email}}</td>
            <td class="px-4 py-3">
              <span class="text-xs px-2 py-0.5 rounded-full
                {{if eq .Role "admin"}}bg-purple-100 text-purple-700
                {{else}}bg-gray-100 text-gray-600{{end}}">
                {{.Role}}
              </span>
            </td>
            <td class="px-4 py-3 text-right">
              <button
                hx-delete="/admin/users/{{.ID}}"
                hx-confirm="¿Eliminar a {{.Name}}?"
                hx-target="closest tr"
                hx-swap="outerHTML"
                class="text-xs bg-red-100 hover:bg-red-200 text-red-700 px-3 py-1 rounded-lg">
                Eliminar
              </button>
            </td>
          </tr>
        {{end}}
      </tbody>
    </table>
  </div>
</div>
{{end}}
